version: "3.9"

services:
  redis:
    image: redis:8
    container_name: redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data          # persist data khi restart
    command: >
      redis-server
      --save 60 1
      --loglevel warning
    restart: unless-stopped

volumes:
  redis-data: